<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f3d2e" />
    <title>ألف سالاد | Alef Salad</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f7f3e8 0%, #efe8da 100%);
        color: #123022;
        font-family: Arial, sans-serif;
      }
      .card {
        width: min(92vw, 420px);
        padding: 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 24px 70px rgba(8, 25, 16, 0.12);
        text-align: center;
      }
      .badge {
        width: 86px;
        height: 86px;
        margin: 0 auto 16px;
        border-radius: 26px;
        background: #0f3d2e;
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 42px;
        font-weight: 800;
      }
      .muted { color: #5f6d63; line-height: 1.8; }
      .btn {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 18px;
        border-radius: 16px;
        background: #0f3d2e;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">أ</div>
      <h1>ألف سالاد</h1>
      <p class="muted">جاري تحميل التطبيق المتصل بموقع ألف سالاد الرسمي.</p>
      <p class="muted">لو الإنترنت قطع مؤقتًا، جرّب تاني بعد شوية.</p>
      <a class="btn" href="https://delivery-theta-pink.vercel.app/">افتح الموقع</a>
    </main>
  </body>
</html>
